<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>飞书文档转 Markdown</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <main class="shell">
      <section class="panel">
        <div class="heading">
          <p class="eyebrow">Feishu Markdown Exporter</p>
          <h1>飞书云文档转本地 Markdown</h1>
          <p class="summary">从飞书手动导出 DOCX 后，在本机生成 Markdown 文件和本地图片目录。</p>
        </div>

        <form id="docxForm" class="form">
          <div class="file-row">
            <label>
              <span>DOCX 文件（可多选）</span>
              <input name="docxFile" type="file" multiple accept=".docx,application/vnd.openxmlformats-officedocument.wordprocessingml.document">
            </label>
            <span class="or">或</span>
            <label>
              <span>本机 DOCX 路径</span>
              <input name="docxPath" type="text" placeholder="D:\Downloads\飞书导出文档.docx">
            </label>
          </div>

          <div class="grid">
            <label>
              <span>保存目录</span>
              <input name="outputDir" type="text" value="D:\work space\feishu-md-exporter\exports">
            </label>
            <label>
              <span>文件后缀</span>
              <select name="extension">
                <option value="md">.md</option>
                <option value="mk">.mk</option>
              </select>
            </label>
          </div>

          <label>
            <span>Pandoc 路径</span>
            <input name="pandocPath" type="text" value="C:\Users\xfli43\AppData\Local\Programs\Pandoc\pandoc-3.9.0.2\pandoc.exe">
          </label>

          <button id="docxButton" type="submit">转换 DOCX</button>
        </form>

        <details class="legacy">
          <summary>仍然使用飞书开放平台直连</summary>
          <form id="exportForm" class="form">
            <label>
              <span>飞书文档链接</span>
              <input name="docUrl" type="url" placeholder="https://xxx.feishu.cn/docx/...">
            </label>

            <div class="grid">
              <label>
                <span>App ID</span>
                <input name="appId" type="password" autocomplete="off" placeholder="cli_xxx">
              </label>
              <label>
                <span>App Secret</span>
                <input name="appSecret" type="password" autocomplete="off" placeholder="可用环境变量代替">
              </label>
            </div>

            <div class="grid">
              <label>
                <span>保存目录</span>
                <input name="outputDir" type="text" value="D:\work space\feishu-md-exporter\exports">
              </label>
              <label>
                <span>文件后缀</span>
                <select name="extension">
                  <option value="md">.md</option>
                  <option value="mk">.mk</option>
                </select>
              </label>
            </div>

            <button id="submitButton" type="submit">从飞书接口导出</button>
          </form>
        </details>

        <div id="status" class="status" hidden></div>
      </section>

      <aside class="notes">
        <h2>推荐流程</h2>
        <ol>
          <li>在企业定制飞书里打开云文档。</li>
          <li>使用飞书自带导出功能下载为 DOCX。</li>
          <li>在本页面选择该 DOCX，或填写它的本机完整路径。</li>
          <li>设置保存目录后转换，图片会进入同级 assets 目录。</li>
        </ol>
      </aside>
    </main>

    <script src="/app.js"></script>
  </body>
</html>
